runtime:
  use_ray: false
  seed: 42
  device: cuda
  smoke_random_init: false

paths:
  # 可选：显式指定 starVLA 仓路径；不填时从 ckpt 自动推断。
  starvla_repo: /project/peilab/qjl/2026/wmrl/starVLA
  # 可选：覆盖 lewm 配置；通常为空，走 lewm_repo/config/train/lewm.yaml。
  lewm_cfg_path: null
  lewm_repo: /project/peilab/qjl/2026/wmrl/le-wm
  starvla_ckpt: /project/peilab/qjl/2026/wmrl/playground/vla/
  lewm_ckpt: /project/peilab/qjl/2026/wmrl/playground/wm/epoch=99-step=66924.ckpt

data:
  dataloader_type: starvla_lerobot
  starvla_cfg: /project/peilab/qjl/2026/wmrl/config/qwen35vlPI_libero.yaml
  train_batch_size: 4
  num_workers: 2
  max_steps: 1000

algorithm:
  rollout_n: 4
  num_flow_steps: 8
  ppo_epochs: 1
  ppo_mini_batch_size: 0
  normalize_advantage: true
  adv_norm_mode: group
  adv_norm_eps: 1e-6
  clip_ratio: 0.2
  target_kl: 0.1
  kl_stop_on_exceed: true
  max_ratio_guard: 20.0
  entropy_coeff: 0.001
  actor_lr: 1e-6
  sigma_lr: 1e-5
  max_grad_norm: 1.0
  adv_estimator: grpo
  gamma: 1.0
  lam: 1.0
  sigma_net:
    hidden_dim: 1024
    num_layers: 4
    num_heads: 8
    min_std: 0.02
    max_std: 0.30
    dropout: 0.0

reward:
  type: cosine_dense
  aggregate: mean
  discount: 0.99
  normalize: true
  tokenization_mode: time_action
  fallback_to_action_embedding: false
  strict_lewm_load: true
  min_param_load_ratio: 0.90

trainer:
  total_training_steps: 200
  auto_resume: true
  min_reward_std: 1e-6
  log_interval: 10
  save_interval: 100
  output_dir: /project/peilab/qjl/2026/wmrl/checkpoints/wmrl_qwenpi
